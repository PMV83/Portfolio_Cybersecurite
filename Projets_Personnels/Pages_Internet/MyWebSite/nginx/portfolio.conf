# ================================================================
# Nginx — Configuration pour portfolio statique sur Proxmox
# À adapter selon ton sous-domaine / reverse proxy
# ================================================================

server {
    listen 80;
    listen [::]:80;

    # Change selon ton domaine / IP
    server_name portfolio.pmvix.com www.portfolio.pmvix.com;

    # Redirection HTTPS (recommandé)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name portfolio.pmvix.com www.portfolio.pmvix.com;

    # ── TLS (Certbot / Let's Encrypt ou Cloudflare Origin) ──
    ssl_certificate     /etc/letsencrypt/live/portfolio.pmvix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.pmvix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── HSTS (6 mois) ──
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Security headers ──
    add_header X-Frame-Options           "DENY"                      always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self'; \
         style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; \
         font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; \
         img-src 'self' data: https://avatars.githubusercontent.com; \
         connect-src 'self' https://api.github.com; \
         frame-ancestors 'none';" always;

    # ── Racine du site ──
    root /var/www/portfolio;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Cache statique (assets) ──
    location ~* \.(css|js|woff2?|ttf|eot|otf|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location ~* \.pdf$ {
        expires 1d;
        add_header Content-Disposition "attachment";
    }

    # ── HTML sans cache ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback / 404 ──
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Pages d'erreur personnalisées ──
    error_page 404 /index.html;

    # ── Bloquer accès aux fichiers sensibles ──
    location ~ /\. {
        deny all;
    }

    # ── Logs ──
    access_log /var/log/nginx/portfolio_access.log;
    error_log  /var/log/nginx/portfolio_error.log warn;
}
