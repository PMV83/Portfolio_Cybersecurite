server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Cache statique
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JSON (posts) — pas de cache pour avoir les mises à jour en live
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Headers sécurité (Cloudflare Tunnel gère le TLS, pas besoin de HSTS ici)
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https://api.github.com; frame-ancestors 'none';"
        always;

    location / {
        try_files $uri $uri/ =404;
    }
}
