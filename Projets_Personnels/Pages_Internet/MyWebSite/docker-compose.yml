services:
  web:
    image: nginx:alpine
    container_name: portfolio_cyber
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
